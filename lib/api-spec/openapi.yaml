openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Kalshi
    description: Kalshi trading bot metrics (proxied from droplet).
  - name: Stripe
    description: Stripe revenue and subscriber metrics.
  - name: Replit
    description: Replit project and usage metrics.
  - name: Marketing
    description: Google Search Console, Google Ads, and Instantly.ai metrics.
  - name: Stocks
    description: Stock portfolio data from Tradier and Public.com.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUserAlias
      summary: Alias for /auth/me — get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /kalshi/stats:
    get:
      tags: [Kalshi]
      operationId: getKalshiStats
      summary: Get live Kalshi bot metrics (proxied from droplet)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Kalshi stats from the configured droplet endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KalshiStats'
        '503':
          description: KALSHI_STATS_URL not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredError'
        '502':
          description: Upstream Kalshi endpoint unreachable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /stripe/metrics:
    get:
      tags: [Stripe]
      operationId: getStripeMetrics
      summary: Get Stripe revenue and subscriber metrics
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Aggregated Stripe metrics across all configured accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StripeMetrics'
        '503':
          description: No Stripe keys configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredError'
  /replit/metrics:
    get:
      tags: [Replit]
      operationId: getReplitMetrics
      summary: Get Replit project and usage metrics
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Replit account and project stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplitMetrics'
        '503':
          description: REPLIT_API_KEY not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredError'
  /marketing/search-console:
    get:
      tags: [Marketing]
      operationId: getSearchConsoleMetrics
      summary: Get Google Search Console metrics (last 30 days)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Clicks, impressions, CTR and average position.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchConsoleMetrics'
        '503':
          description: Required env vars not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredError'
  /marketing/google-ads:
    get:
      tags: [Marketing]
      operationId: getGoogleAdsMetrics
      summary: Get Google Ads spend and conversion metrics (last 30 days)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Spend, conversions, impressions and clicks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleAdsMetrics'
        '503':
          description: Required env vars not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredError'
  /marketing/instantly:
    get:
      tags: [Marketing]
      operationId: getInstantlyMetrics
      summary: Get Instantly.ai campaign metrics
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Campaign summary and email engagement rates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstantlyMetrics'
        '503':
          description: INSTANTLY_API_KEY not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredError'
  /stocks/tradier:
    get:
      tags: [Stocks]
      operationId: getTradierPortfolio
      summary: Get Tradier portfolio positions and values
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Portfolio positions with current prices.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradierPortfolio'
        '503':
          description: TRADIER_API_TOKEN not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredError'
  /stocks/public:
    get:
      tags: [Stocks]
      operationId: getPublicPortfolio
      summary: Get Public.com portfolio holdings and values
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Portfolio value and holdings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicPortfolio'
        '503':
          description: PUBLIC_COM_API_KEY not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredError'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    NotConfiguredError:
      type: object
      required: [error, configured]
      properties:
        error:
          type: string
        configured:
          type: boolean
          const: false
    KalshiStats:
      type: object
      description: >
        Flexible object returned by the configured KALSHI_STATS_URL endpoint.
        Common fields are listed; additional fields pass through as-is.
      properties:
        hit_rate:
          type: ['number', 'null']
        hitRate:
          type: ['number', 'null']
        open_positions:
          type: ['number', 'null']
        openPositions:
          type: ['number', 'null']
        balance:
          type: ['number', 'null']
        pnl:
          type: ['number', 'null']
        total_trades:
          type: ['number', 'null']
        wins:
          type: ['number', 'null']
        losses:
          type: ['number', 'null']
      additionalProperties: true
    StripePriceBreakdown:
      type: object
      required: [name, mrr, activeCount]
      properties:
        name:
          type: string
        mrr:
          type: number
        activeCount:
          type: number
    StripeMetrics:
      type: object
      required: [mrr, totalRevenue30d, newSubscribers30d, activeSubscriptions, byPriceId]
      properties:
        mrr:
          type: number
        totalRevenue30d:
          type: number
        newSubscribers30d:
          type: number
        activeSubscriptions:
          type: number
        byPriceId:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/StripePriceBreakdown'
        errors:
          type: array
          items:
            type: string
    ReplitRepl:
      type: object
      required: [id, title, slug, isPrivate, hasDeployment, runCount, forkCount, likeCount]
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        isPrivate:
          type: boolean
        hasDeployment:
          type: boolean
        deploymentDomain:
          type: ['string', 'null']
        runCount:
          type: number
        forkCount:
          type: number
        likeCount:
          type: number
    ReplitMetrics:
      type: object
      required: [username, isVerified, followerCount, followingCount, totalRepls, deployedCount, totalRuns, totalForks, totalLikes, repls]
      properties:
        username:
          type: string
        isVerified:
          type: boolean
        followerCount:
          type: number
        followingCount:
          type: number
        totalRepls:
          type: number
        deployedCount:
          type: number
        totalRuns:
          type: number
        totalForks:
          type: number
        totalLikes:
          type: number
        repls:
          type: array
          items:
            $ref: '#/components/schemas/ReplitRepl'
    SearchConsoleMetrics:
      type: object
      required: [clicks, impressions, avgCtr, avgPosition]
      properties:
        clicks:
          type: number
        impressions:
          type: number
        avgCtr:
          type: number
        avgPosition:
          type: number
    GoogleAdsMetrics:
      type: object
      required: [spend, conversions, impressions, clicks]
      properties:
        spend:
          type: number
        conversions:
          type: number
        impressions:
          type: number
        clicks:
          type: number
    InstantlyCampaign:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: number
    InstantlyMetrics:
      type: object
      required: [activeCampaigns, totalCampaigns, emailsSent30d, openRate, replyRate, campaigns]
      properties:
        activeCampaigns:
          type: number
        totalCampaigns:
          type: number
        emailsSent30d:
          type: number
        openRate:
          type: number
        replyRate:
          type: number
        campaigns:
          type: array
          items:
            $ref: '#/components/schemas/InstantlyCampaign'
    StockPosition:
      type: object
      required: [symbol, quantity, currentPrice, value, costBasis, gainLoss, gainLossPct, dayChangePct]
      properties:
        symbol:
          type: string
        quantity:
          type: number
        currentPrice:
          type: number
        value:
          type: number
        costBasis:
          type: number
        gainLoss:
          type: number
        gainLossPct:
          type: number
        dayChangePct:
          type: number
    TradierPortfolio:
      type: object
      required: [positions, totalValue, totalCostBasis, totalGainLoss]
      properties:
        positions:
          type: array
          items:
            $ref: '#/components/schemas/StockPosition'
        totalValue:
          type: number
        totalCostBasis:
          type: number
        totalGainLoss:
          type: number
    PublicHolding:
      type: object
      required: [symbol, name, quantity, currentPrice, value, gainLoss, gainLossPct]
      properties:
        symbol:
          type: string
        name:
          type: string
        quantity:
          type: number
        currentPrice:
          type: number
        value:
          type: number
        gainLoss:
          type: number
        gainLossPct:
          type: number
    PublicPortfolio:
      type: object
      required: [portfolioValue, totalGainLoss, totalReturnPct, holdings]
      properties:
        portfolioValue:
          type: number
        totalGainLoss:
          type: number
        totalReturnPct:
          type: number
        holdings:
          type: array
          items:
            $ref: '#/components/schemas/PublicHolding'
